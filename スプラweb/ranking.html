<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ランキング | スプラ戦績</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .ranking-section { display: none; margin-top: 1em; }
    .ranking-buttons button {
      margin: 0.5em;
      padding: 0.5em 1em;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 0.5em;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 0.4em 0.6em;
      text-align: center;
    }
    th {
      background-color: #f0f0f0;
      cursor: pointer;
    }
    label {
      display: inline-block;
      margin-top: 0.5em;
      margin-right: 1em;
    }
    #seasonSelect {
      margin-top: 0.5em;
      padding: 0.4em;
      font-size: 1em;
    }
    #lastUpdated {
      font-size: 0.9em;
      color: #666;
      margin-top: 0.5em;
    }
    .filter-group {
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <a href="mypage.html">🏠 マイページ</a>
    <a href="entry.html">📝 戦績登録</a>
    <a href="ranking.html">📊 ランキング</a>
    <a href="admin.html" id="adminLink" style="display:none;">🛠 管理者ページ</a>
    <a href="#" onclick="logout()">🚪 ログアウト</a>
  </div>

  <div class="main">
    <h2>ランキング</h2>

    <label for="seasonSelect">シーズン選択：</label>
    <select id="seasonSelect" onchange="loadRankingForSeason(this.value)">
      <option>読み込み中...</option>
    </select>
    <p id="lastUpdated"></p>

    <div class="filter-group">
      <label>最小XP（全ランキング共通）：
        <input type="number" id="globalXpMinFilter" placeholder="例: 2500" onchange="renderRankingTables()">
      </label>
    </div>

    <div class="ranking-buttons">
      <button onclick="showRanking('player')">プレイヤー勝率</button>
      <button onclick="showRanking('weapon')">武器別勝率</button>
      <button onclick="showRanking('playerWeapon')">プレイヤー×武器別勝率</button>
      <button onclick="showRanking('xp')">XPランキング</button>
    </div>

    <!-- プレイヤー勝率ランキング -->
    <div id="playerRanking" class="ranking-section">
      <h3>プレイヤー勝率ランキング</h3>
      <label>最低試合数：
        <input type="number" id="playerMinGames" placeholder="例: 5" onchange="renderRankingTables()">
      </label>
      <label>プレイヤー名で検索：
        <input type="text" id="playerNameFilter" placeholder="例: アクア" oninput="renderRankingTables()">
      </label>
      <label>表示件数：
        <select id="playerLimitFilter" onchange="renderRankingTables()">
          <option value="">すべて</option>
          <option value="10">TOP 10</option>
          <option value="20">TOP 20</option>
          <option value="50">TOP 50</option>
        </select>
      </label>
      <table id="playerRankingTable">
        <thead>
          <tr>
            <th>順位</th>
            <th>プレイヤー</th>
            <th>勝率</th>
            <th>勝利数</th>
            <th>試合数</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 武器別勝率ランキング -->
    <div id="weaponRanking" class="ranking-section">
      <h3>武器別勝率ランキング</h3>
      <label>最低試合数：
        <input type="number" id="weaponMinGames" placeholder="例: 5" onchange="renderRankingTables()">
      </label>
      <label>武器名で検索：
        <input type="text" id="weaponNameFilter" placeholder="例: スプラシューター" oninput="renderRankingTables()">
      </label>
      <label>表示件数：
        <select id="weaponLimitFilter" onchange="renderRankingTables()">
          <option value="">すべて</option>
          <option value="10">TOP 10</option>
          <option value="20">TOP 20</option>
          <option value="50">TOP 50</option>
        </select>
      </label>
      <table id="weaponRankingTable">
        <thead>
          <tr>
            <th>順位</th>
            <th>武器</th>
            <th>勝率</th>
            <th>勝利数</th>
            <th>試合数</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- プレイヤー×武器別勝率ランキング -->
    <div id="playerWeaponRanking" class="ranking-section">
      <h3>プレイヤー×武器別勝率ランキング</h3>
      <label>最低試合数：
        <input type="number" id="playerWeaponMinGames" placeholder="例: 5" onchange="renderRankingTables()">
      </label>
      <label>プレイヤー名で検索：
        <input type="text" id="playerWeaponNameFilter" placeholder="例: アクア" oninput="renderRankingTables()">
      </label>
      <label>武器名で検索：
        <input type="text" id="playerWeaponWeaponFilter" placeholder="例: スプラシューター" oninput="renderRankingTables()">
      </label>
      <label>表示件数：
        <select id="playerWeaponLimitFilter" onchange="renderRankingTables()">
          <option value="">すべて</option>
          <option value="10">TOP 10</option>
          <option value="20">TOP 20</option>
          <option value="50">TOP 50</option>
        </select>
      </label>
      <table id="playerWeaponRankingTable">
        <thead>
          <tr>
            <th>順位</th>
            <th>プレイヤー</th>
            <th>武器</th>
            <th>勝率</th>
            <th>勝利数</th>
            <th>試合数</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- XPランキング -->
    <div id="xpRanking" class="ranking-section">
      <h3>XPランキング</h3>
      <label>最小XP：
        <input type="number" id="xpMinFilter" placeholder="例: 2500" onchange="renderRankingTables()">
      </label>
      <label>プレイヤー名で検索：
        <input type="text" id="xpNameFilter" placeholder="例: アクア" oninput="renderRankingTables()">
      </label>
      <label>表示件数：
        <select id="xpLimitFilter" onchange="renderRankingTables()">
          <option value="">すべて</option>
          <option value="10">TOP 10</option>
          <option value="20">TOP 20</option>
          <option value="50">TOP 50</option>
        </select>
      </label>
      <table id="xpRankingTable">
        <thead>
          <tr>
            <th>順位</th>
            <th>プレイヤー</th>
            <th>XP</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- スクリプトは最後に読み込む！ -->
  <script src="common.js"></script>
  <script src="ranking.js"></script>
</body>
</html>
