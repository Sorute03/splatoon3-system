<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理者ページ</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    .back-button {
      margin-bottom: 1em;
      padding: 6px 12px;
      background-color: #eee;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 2em;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    textarea {
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h2>管理者ページ</h2>
  <button class="back-button" onclick="location.href='mypage.html'">← マイページに戻る</button>

  <section>
    <h2>ユーザー一覧</h2>
    <table>
      <thead>
        <tr>
          <th>プレイヤー名</th>
          <th>ユーザーID</th>
          <th>BAN</th>
          <th>モデレーター</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userListBody"></tbody>
    </table>
  </section>

  <section>
    <h2>通報一覧</h2>
    <div id="reportList"></div>
  </section>

  <script>
    const API_URL = "https://sorute-api.haruto-mori0602.workers.dev/";

    async function loadUsers() {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "getUserList" })
      });

      const result = await res.json();
      const users = result.users;
      const container = document.getElementById("userListBody");
      container.innerHTML = "";

      if (!Array.isArray(users)) {
        container.innerHTML = "<tr><td colspan='5'>ユーザー情報の取得に失敗しました。</td></tr>";
        console.error("users is not an array:", users);
        return;
      }

      const isAdmin = localStorage.getItem("isAdmin") === "true";
      const isModerator = localStorage.getItem("isModerator") === "true";

      users.forEach(user => {
        const tr = document.createElement("tr");
        const isBanned = user.IsBanned === "TRUE";
        const isMod = user.isModerator === "TRUE";

        let buttons = "";

        if (isAdmin) {
          buttons += `
            <button onclick="toggleBan('${user.UserID}', ${!isBanned})">
              ${isBanned ? '解除' : 'BAN'}
            </button>
            <button onclick="toggleMod('${user.UserID}', ${!isMod})">
              ${isMod ? '解除' : 'モデレーターにする'}
            </button>
          `;
        } else if (isModerator && isBanned) {
          buttons += `
            <button onclick="toggleBan('${user.UserID}', true)">
              解除
            </button>
          `;
        }

        tr.innerHTML = `
          <td>${user.PlayerName}</td>
          <td>${user.UserID}</td>
          <td>${user.IsBanned}</td>
          <td>${user.isModerator}</td>
          <td>${buttons}</td>
        `;
        container.appendChild(tr);
      });
    }

    async function toggleBan(userId, newStatus) {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "banUser", userId, isBanned: newStatus })
      });
      loadUsers();
    }

    async function toggleMod(userId, newStatus) {
      const isAdmin = localStorage.getItem("isAdmin") === "true";
      if (!isAdmin) {
        alert("モデレーター設定は管理者のみ可能です。");
        return;
      }

      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "setModerator", userId, isModerator: newStatus })
      });
      loadUsers();
    }

    async function loadReports() {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "getReports" })
      });

      const result = await res.json();
      const reports = result.reports;
      const container = document.getElementById("reportList");
      container.innerHTML = "";

      if (!Array.isArray(reports)) {
        container.textContent = "通報情報の取得に失敗しました。";
        console.error("reports is not an array:", reports);
        return;
      }

      reports.forEach(report => {
        const div = document.createElement("div");
        div.innerHTML = `
          <strong>${report.reporterId}</strong> → <strong>${report.targetId}</strong><br>
          理由: ${report.reason}<br>
          日時: ${report.timestamp}<br>
          状態: ${report.status}<br>
          <textarea id="note-${report.reportId}" placeholder="対応メモ"></textarea>
          <button onclick="handleReport('${report.reportId}')">対応済みにする</button>
          <hr>
        `;
        container.appendChild(div);
      });
    }

    async function handleReport(reportId) {
      const note = document.getElementById(`note-${reportId}`).value;
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "markReportHandled", reportId, note })
      });
      loadReports();
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadUsers();
      loadReports();
    });
  </script>
</body>
</html>
