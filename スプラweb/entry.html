<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>戦績登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
  <style>
    body {
      font-family: 'Ikamodoki', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      color: #fefefe;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
    }

    #sidebar-container {
      width: 220px;
      padding: 1em;
      background-color: rgba(255, 255, 255, 0.05);
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
    }

    .main {
      flex: 1;
      max-width: 1000px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2em;
      margin: 1em;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    h2 {
      text-align: center;
      color: #ffe600;
    }

    label {
      display: block;
      margin-top: 1em;
      font-weight: bold;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
      background: #fff;
      color: #000;
    }

    button {
      background-color: #00cfff;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      font-weight: bold;
      border-radius: 8px;
      box-shadow: 0 4px #000;
      cursor: pointer;
      margin-top: 1.5em;
      width: 100%;
      transition: transform 0.1s ease;
      font-family: inherit;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #ffe600;
      color: #000;
    }

    .message {
      margin-top: 1em;
      font-weight: bold;
    }

    #postSubmitOptions {
      margin-top: 2em;
      text-align: center;
    }

    #postSubmitOptions button {
      width: 48%;
      margin: 0.5em 1%;
    }

    @media screen and (max-width: 768px) {
      body {
        flex-direction: column;
        align-items: stretch;
        padding: 1em;
      }

      #sidebar-container {
        width: 100%;
        margin-bottom: 1em;
        box-shadow: none;
      }

      .main {
        max-width: 100%;
        margin: 0;
        padding: 1.5em;
      }

      #postSubmitOptions button {
        width: 100%;
        margin: 0.5em 0;
      }
    }
  </style>
</head>
<body onload="requireLogin(); showUserInfo();">
  <div id="sidebar-container"></div>

  <div class="main">
    <h2>戦績登録</h2>

    <form id="matchForm">
      <label>マッチの種類:</label>
      <select id="matchType" name="matchType" required>
        <option value="">選択してください</option>
        <option value="turf">ナワバリバトル</option>
        <option value="xmatch">Xマッチ</option>
        <option value="challenge">チャレンジ</option>
        <option value="open">オープン</option>
        <option value="event">イベントマッチ</option>
      </select>

      <label>ルール:</label>
      <select id="rule" name="rule" required>
        <option value="">ルールを選択</option>
      </select>

      <div id="xMatchOptions" style="display:none;">
        <label>入力方法:</label>
        <select id="xMatchMode">
          <option value="single">1戦ずつ入力</option>
          <option value="set">3戦まとめて入力</option>
        </select>
      </div>

      <div id="matchInputs"></div>

      <div id="xpInput" style="display:none;">
        <label>XP:</label>
        <input type="number" id="xp" name="xp" placeholder="計測中なら空白で確定してください">
      </div>

      <button type="submit">登録</button>
    </form>

    <div id="matchMessage" class="message"></div>

    <div id="postSubmitOptions" style="display:none;">
      <p>次にどうしますか？</p>
      <button type="button" id="goToMyPage">マイページに戻る</button>
      <button type="button" id="addAnother">もう1件入力する</button>
    </div>
  </div>

  <script src="entry.js" defer></script>
</body>
</html>
