<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スプラトゥーン戦績サイト</title>
  <link rel="stylesheet" href="splatoonweb/style.css" />
  <style>
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    /* ← ここが重要：文字色を濃いグレーに固定 */
    .site-description {
      background-color: #ffffff;
      padding: 1.5rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: 2rem 0;
      text-align: left;
      color: #333; /* ← 追加：文字色を明確に指定 */
    }

    .site-description h2 {
      color: #333;
      margin-bottom: 1rem;
    }

    .site-description p {
      line-height: 1.6;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 スプラトゥーン戦績サイトへようこそ！</h1>

    <section class="site-description">
      <h2>このサイトについて</h2>
      <p>
        このサイトは、スプラトゥーンのバトルデータを記録・分析できる非公式の戦績管理ツールです。  
        自分の戦績を確認したり、他のプレイヤーとランキングで競い合ったり、使用武器の傾向をチェックしたりできます！
      </p>
      <p>
        登録してマイページを作成すれば、自分のバトル履歴や勝率、キルデス比などをグラフで確認できます。  
        スプラトゥーンをもっと楽しみたいあなたにぴったりのツールです！🎯
      </p>
    </section>

    <div class="button-group">
      <a class="button" href="splatoonweb/register.html">新規登録</a>
      <a class="button" href="splatoonweb/index.html">マイページへ</a>
    </div>
  </div>
</body>
</html>
