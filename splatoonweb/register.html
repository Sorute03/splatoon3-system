<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="スプラトゥーンの戦績を記録・分析できる非公式ツール。勝率、キルデス比、ランキングなどを確認できます。">
  <!-- Open Graph (SNS共有用) -->
  <meta property="og:title" content="SPL3VRMH | Splatoon3 Various Rankings and Match History Page">
  <meta property="og:description" content="スプラトゥーンの戦績を記録・分析できる非公式ツール。勝率、キルデス比、ランキングなどを確認できます。">
  <meta property="og:url" content="http://spl3vrmh.dpdns.org/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="http://spl3vrmh.dpdns.org/splatoonweb/ogp.png">
  <meta property="og:site_name" content="SPL3VRMH">
  <title>新規登録ページ | SPL3VRMH</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
  <style>
    body {
      font-family: 'Ikamodoki', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      color: #fefefe;
      margin: 0;
      padding: 2em 1em;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      text-align: center;
      color: #ffe600;
    }

    .register-container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2em;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }

    input {
      background: #fff;
      color: #000;
    }

    button {
      background-color: #39ff14;
      color: #000;
      font-weight: bold;
      box-shadow: 0 4px #000;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #ffe600;
      color: #000;
    }

    .message {
      margin-top: 1em;
      font-weight: bold;
    }

    a {
      color: #00cfff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 480px) {
      body {
        padding: 1em;
      }

      input, button {
        font-size: 1em;
      }

      .register-container {
        padding: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h2>新規登録</h2>
    <input id="regPlayerName" placeholder="プレイヤー名"><br>
    <input id="regPassword" type="password" placeholder="パスワード（6文字以上）"><br>
    <input id="regSecretId" placeholder="シークレットID（4桁）"><br>
    <button onclick="register()">登録する</button>
    <p><a href="index.html">ログイン画面に戻る</a></p>
    <div id="registerMessage" class="message"></div>
  </div>
</body>
</html>
