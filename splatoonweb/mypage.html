<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイページ | スプラ戦績</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="common.js"></script>
  <script defer src="mypage.js"></script>
  <style>
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 6px; margin-top: 4px; }
    #status { margin-top: 15px; font-weight: bold; }
    .section { margin-top: 30px; }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 1.5em;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }
    .close {
      position: absolute;
      top: 0.5em;
      right: 1em;
      font-size: 1.5em;
      cursor: pointer;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      padding: 8px;
      border: 1px solid #ccc;
      text-align: center;
    }
    .filters {
      margin-bottom: 10px;
    }
    .filters label {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <a href="mypage.html">🏠 マイページ</a>
    <a href="entry.html">📝 戦績登録</a>
    <a href="ranking.html">📊 ランキング</a>
    <a href="admin.html" id="adminLink" style="display:none;">🛠 管理者ページ</a>
    <a href="#" onclick="logout()">🚪 ログアウト</a>
  </div>

  <div class="main">
    <h2>マイページ</h2>
    <p id="welcomeMessage">ようこそ、<span id="mypageName"></span> さん！</p>
    <div id="reportArea"></div>

    <div class="section">
      <h3>あなたのID情報</h3>
      <p><strong>ユーザーID:</strong> <span id="userIdDisplay"></span></p>
      <p><strong>シークレットID:</strong> <span id="secretIdDisplay"></span></p>
    </div>

    <div class="section" id="passwordSection">
      <h3>パスワード変更</h3>
      <form id="passwordForm">
        <label>現在のパスワード:
          <input type="password" name="currentPassword" autocomplete="current-password" required>
        </label>
        <label>新しいパスワード:
          <input type="password" name="newPassword" autocomplete="new-password" required>
        </label>
        <label>新しいパスワード（確認）:
          <input type="password" name="confirmPassword" autocomplete="new-password" required>
        </label>
        <button type="submit">変更する</button>
      </form>
      <div id="status"></div>
    </div>

    <div class="section" id="publicSettingSection" style="display:none;">
      <label>
        <input type="checkbox" id="publicToggle">
        戦績を他のユーザーに公開する
      </label>
      <div id="publicStatus" style="margin-top: 0.5em; color: green;"></div>
    </div>

    <div class="section" id="privateNotice" style="display:none;">
      <p style="color: gray;">このユーザーは戦績を非公開に設定しています。</p>
    </div>

    <div class="section">
      <h3>バトル履歴グラフ</h3>

      <div class="filters">
        <label for="ruleFilter">ルール:</label>
        <select id="ruleFilter"><option value="ALL">すべて</option></select>

        <label for="weaponFilter">武器:</label>
        <select id="weaponFilter"><option value="ALL">すべて</option></select>

        <button id="applyFilters">グラフを更新</button>
      </div>

      <div style="margin-top: 1em;">
        <button id="toggleChartBtn">📊 グラフ切り替え</button>
      </div>

      <div id="chartContainer">
        <canvas id="winRateChart" width="400" height="200"></canvas>
        <canvas id="kdChart" width="400" height="200" style="display:none;"></canvas>
      </div>

      <div id="averageStats" style="margin-top: 1em; font-weight: bold;"></div>
    </div>

    <div class="section">
      <h3>バトル履歴一覧</h3>
      <table id="battleTable">
        <thead>
          <tr>
            <th>日付</th>
            <th>ルール</th>
            <th>武器</th>
            <th>キル</th>
            <th>デス</th>
            <th>勝敗</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- 通報モーダル -->
  <div id="reportModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeReportModal" class="close">&times;</span>
      <h2>通報フォーム</h2>
      <p id="reportTarget"></p>
      <textarea id="reportReason" placeholder="通報理由を入力してください" rows="4" style="width:100%;"></textarea><br>
      <input type="text" id="reportEvidence" placeholder="証拠画像のURL（任意）" style="width:100%;" /><br><br>
      <button id="submitReportBtn">通報を送信</button>
      <div id="reportStatus" style="margin-top: 0.5em; color: red;"></div>
    </div>
  </div>
</body>
</html>
