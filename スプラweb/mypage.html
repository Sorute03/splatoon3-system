<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マイページ | スプラ戦績</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
  <script src="mypage.js" defer></script>
  <style>
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 6px; margin-top: 4px; }
    #status { margin-top: 15px; font-weight: bold; }
    .section { margin-top: 30px; }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 1.5em;
      border-radius: 8px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }
    .close {
      position: absolute;
      top: 0.5em;
      right: 1em;
      font-size: 1.5em;
      cursor: pointer;
    }
  </style>
</head>
<body onload="requireLogin(); showUserInfo();">
  <div class="sidebar">
    <a href="mypage.html">🏠 マイページ</a>
    <a href="entry.html">📝 戦績登録</a>
    <a href="ranking.html">📊 ランキング</a>
    <a href="admin.html" id="adminLink" style="display:none;">🛠 管理者ページ</a>
    <a href="#" onclick="logout()">🚪 ログアウト</a>
  </div>

  <div class="main">
    <h2>マイページ</h2>
    <p id="welcomeMessage">ようこそ、<span id="mypageName"></span> さん！</p>
    <div id="reportArea"></div>

    <div class="section">
      <h3>あなたのID情報</h3>
      <p><strong>ユーザーID:</strong> <span id="userIdDisplay"></span></p>
      <p><strong>シークレットID:</strong> <span id="secretIdDisplay"></span></p>
    </div>

    <div class="section" id="passwordSection">
      <h3>パスワード変更</h3>
      <form id="passwordForm">
        <label>現在のパスワード:
          <input type="password" name="currentPassword" required>
        </label>
        <label>新しいパスワード:
          <input type="password" name="newPassword" required>
        </label>
        <label>新しいパスワード（確認）:
          <input type="password" name="confirmPassword" required>
        </label>
        <button type="submit">変更する</button>
      </form>
      <div id="status"></div>
    </div>
  </div>

  <!-- 通報モーダル -->
  <div id="reportModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeReportModal" class="close">&times;</span>
      <h2>通報フォーム</h2>
      <p id="reportTarget"></p>
      <textarea id="reportReason" placeholder="通報理由を入力してください" rows="4" style="width:100%;"></textarea><br>
      <input type="text" id="reportEvidence" placeholder="証拠画像のURL（任意）" style="width:100%;" /><br><br>
      <button id="submitReportBtn">通報を送信</button>
      <div id="reportStatus" style="margin-top: 0.5em; color: red;"></div>
    </div>
  </div>
</body>
</html>
