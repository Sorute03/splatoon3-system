<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>戦績登録</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    label { display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 6px; margin-top: 4px; }
    .match-block { border: 1px solid #ccc; padding: 10px; margin-top: 15px; }
    #matchMessage { margin-top: 15px; font-weight: bold; }
    #postSubmitOptions { margin-top: 20px; }
    #postSubmitOptions button { margin-right: 10px; }
  </style>
</head>
<body>
  <h2>戦績登録</h2>

  <form id="matchForm">
    <label>マッチの種類:</label>
    <select id="matchType" name="matchType" required>
      <option value="">選択してください</option>
      <option value="turf">ナワバリバトル</option>
      <option value="xmatch">Xマッチ</option>
      <option value="challenge">チャレンジ</option>
      <option value="open">オープン</option>
      <option value="event">イベントマッチ</option>
    </select>

    <label>ルール:</label>
    <select id="rule" name="rule" required>
      <option value="">ルールを選択</option>
    </select>

    <div id="xMatchOptions" style="display:none;">
      <label>入力方法:</label>
      <select id="xMatchMode">
        <option value="single">1戦ずつ入力</option>
        <option value="set">3戦まとめて入力</option>
      </select>
    </div>

    <div id="matchInputs"></div>

    <div id="xpInput" style="display:none;">
      <label>XP:</label>
      <input type="number" id="xp" name="xp" placeholder="計測中なら空白で確定してください">
    </div>

    <button type="submit">登録</button>
  </form>

  <div id="matchMessage"></div>

  <div id="postSubmitOptions" style="display:none;">
    <p>次にどうしますか？</p>
    <button type="button" id="goToMyPage">マイページに戻る</button>
    <button type="button" id="addAnother">もう1件入力する</button>
  </div>

  <script>
    const API_URL = "YOUR_WEBAPP_URL"; // ← あなたのWeb App URLに置き換えてね！

    const ruleSelect = document.getElementById("rule");
    const matchTypeSelect = document.getElementById("matchType");
    const xpInput = document.getElementById("xpInput");
    const xpField = document.getElementById("xp");

    const ruleOptions = {
      turf: ["ナワバリバトル"],
      xmatch: ["ガチエリア", "ガチヤグラ", "ガチホコ", "ガチアサリ"],
      other: ["ナワバリバトル", "ガチエリア", "ガチヤグラ", "ガチホコ", "ガチアサリ"]
    };

    function createMatchInput(index = null) {
      const container = document.createElement("div");
      container.className = "match-block";
      if (index !== null) {
        const title = document.createElement("h4");
        title.textContent = `第${index + 1}戦`;
        container.appendChild(title);
      }

      const fields = [
        { label: "ステージ", name: "stage", required: true },
        { label: "使用ブキ", name: "weapon", required: true },
        { label: "キル数", name: "kills", type: "number", required: true },
        { label: "トドメ数（任意）", name: "finishKills", type: "number" },
        { label: "アシストキル数（任意）", name: "assistKills", type: "number" },
        { label: "デス数", name: "deaths", type: "number", required: true },
        { label: "スペシャル使用回数", name: "specials", type: "number", required: true }
      ];

      fields.forEach(f => {
        const label = document.createElement("label");
        label.textContent = f.label;
        const input = document.createElement("input");
        input.name = f.name + (index !== null ? `_${index}` : "");
        input.type = f.type || "text";
        if (f.required) input.required = true;
        label.appendChild(input);
        container.appendChild(label);
      });

      return container;
    }

    function updateMatchInputs() {
      const matchType = matchTypeSelect.value;
      const mode = document.getElementById("xMatchMode").value;
      const container = document.getElementById("matchInputs");
      container.innerHTML = "";

      if (matchType === "xmatch" && mode === "set") {
        for (let i = 0; i < 3; i++) {
          container.appendChild(createMatchInput(i));
        }
      } else {
        container.appendChild(createMatchInput());
      }
    }

    matchTypeSelect.addEventListener("change", () => {
      const matchType = matchTypeSelect.value;
      let rules = [];

      if (matchType === "xmatch") {
        rules = ruleOptions.xmatch;
        document.getElementById("xMatchOptions").style.display = "block";
      } else if (matchType === "turf") {
        rules = ruleOptions.turf;
        document.getElementById("xMatchOptions").style.display = "none";
      } else {
        rules = ruleOptions.other;
        document.getElementById("xMatchOptions").style.display = "none";
      }

      ruleSelect.innerHTML = "";
      rules.forEach(rule => {
        const option = document.createElement("option");
        option.value = rule;
        option.textContent = rule;
        ruleSelect.appendChild(option);
      });

      xpInput.style.display = "none";
      xpField.value = "";
      updateMatchInputs();
    });

    document.getElementById("xMatchMode").addEventListener("change", updateMatchInputs);

    ruleSelect.addEventListener("change", async () => {
      const rule = ruleSelect.value;
      const matchType = matchTypeSelect.value;
      if (matchType === "xmatch" && rule) {
        const seasonId = await fetchSeasonId();
        const key = `xpSubmitted_${seasonId}_${rule}`;
        if (!localStorage.getItem(key)) {
          xpInput.style.display = "block";
          xpField.placeholder = "計測中なら空白で確定してください";
        }
      }
    });

    async function fetchSeasonId() {
      const formData = new FormData();
      formData.append("data", JSON.stringify({ action: "getCurrentSeasonId" }));
      const res = await fetch(API_URL, { method: "POST", body: formData });
      const text = await res.text();
      const result = JSON.parse(text);
      return result.seasonId;
    }

    document.getElementById("matchForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById("matchMessage");

      const userId = localStorage.getItem("userId");
      const secretId = localStorage.getItem("secretId");
      const seasonId = await fetchSeasonId();
      const rule = form.rule.value;
      const matchType = form.matchType.value;
      const mode = document.getElementById("xMatchMode").value;

      const matches = [];

      if (matchType === "xmatch" && mode === "set") {
        for (let i = 0; i < 3; i++) {
          matches.push({
            userId,
            secretId,
            matchType,
            rule,
            stage: form[`stage_${i}`].value.trim(),
            weapon: form[`weapon_${i}`].value.trim(),
            kills: Number(form[`kills_${i}`].value),
            finishKills: form[`finishKills_${i}`].value ? Number(form[`finishKills_${i}`].value) : "",
            assistKills: form[`assistKills_${i}`].value ? Number(form[`assistKills_${i}`].value) : "",
            deaths: Number(form[`deaths_${i}`].value),
            specials: Number(form[`specials_${i}`].value),
            xp: "" // XPはあとで1回だけ入れる
          });
        }
        const xp = form.xp.value ? Number(form.xp.value) : "";
        matches[matches.length - 1].xp = xp;
      } else {
