<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="スプラトゥーンの戦績を記録・分析できる非公式ツール。勝率、キルデス比、ランキングなどを確認できます。">
  <!-- Open Graph (SNS共有用) -->
  <meta property="og:title" content="SPL3VRMH | Splatoon3 Various Rankings and Match History Page">
  <meta property="og:description" content="スプラトゥーンの戦績を記録・分析できる非公式ツール。勝率、キルデス比、ランキングなどを確認できます。">
  <meta property="og:url" content="http://spl3vrmh.dpdns.org/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="http://spl3vrmh.dpdns.org/splatoonweb/ogp.png">
  <meta property="og:site_name" content="SPL3VRMH">

  <title>戦績登録ページ | SPL3VRMH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
</head>
<body onload="requireLogin(); showUserInfo(); loadSidebar();">
  <div id="sidebar-container"></div>

  <div class="main">
    <h2>戦績登録</h2>

    <form id="matchForm">
      <label>マッチの種類:</label>
      <select id="matchType" name="matchType" required>
        <option value="">選択してください</option>
        <option value="turf">ナワバリバトル</option>
        <option value="xmatch">Xマッチ</option>
        <option value="challenge">チャレンジ</option>
        <option value="open">オープン</option>
        <option value="event">イベントマッチ</option>
      </select>

      <label>ルール:</label>
      <select id="rule" name="rule" required>
        <option value="">ルールを選択</option>
      </select>

      <div id="xMatchOptions" style="display:none;">
        <label>入力方法:</label>
        <select id="xMatchMode">
          <option value="single">1戦ずつ入力</option>
          <option value="set">3戦まとめて入力</option>
        </select>
      </div>

      <div id="matchInputs"></div>

      <div id="xpInput" style="display:none;">
        <label>XP:</label>
        <input type="number" id="xp" name="xp" placeholder="計測中なら空白で確定してください">
      </div>

      <button type="submit">登録</button>
    </form>

    <div id="matchMessage" class="message"></div>

    <div id="postSubmitOptions" style="display:none;">
      <p>次にどうしますか？</p>
      <button type="button" id="goToMyPage">マイページに戻る</button>
      <button type="button" id="addAnother">もう1件入力する</button>
    </div>
  </div>

  <script src="entry.js" defer></script>
</body>
</html>
