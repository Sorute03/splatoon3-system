<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ランキング | スプラ戦績</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
  <style>
    .ranking-section { display: none; }
    .ranking-buttons button {
      margin: 0.5em;
      padding: 0.5em 1em;
    }
  </style>
</head>
<body onload="requireLogin(); loadRanking(); showUserInfo();">
  <div class="sidebar">
    <a href="mypage.html">🏠 マイページ</a>
    <a href="entry.html">📝 戦績登録</a>
    <a href="ranking.html">📊 ランキング</a>
    <a href="admin.html" id="adminLink" style="display:none;">🛠 管理者ページ</a>
    <a href="#" onclick="logout()">🚪 ログアウト</a>
  </div>

  <div class="main">
    <h2>ランキング</h2>

    <div class="ranking-buttons">
      <button onclick="showRanking('player')">プレイヤー勝率</button>
      <button onclick="showRanking('weapon')">武器別勝率</button>
      <button onclick="showRanking('playerWeapon')">プレイヤー×武器別勝率</button>
    </div>

    <div id="playerRanking" class="ranking-section">
      <h3>プレイヤー勝率ランキング</h3>
      <table border="1" id="playerRankingTable">
        <thead>
          <tr><th>順位</th><th>プレイヤー</th><th>勝率</th><th>勝利数</th><th>試合数</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="weaponRanking" class="ranking-section">
      <h3>武器別勝率ランキング</h3>
      <table border="1" id="weaponRankingTable">
        <thead>
          <tr><th>順位</th><th>武器</th><th>勝率</th><th>勝利数</th><th>試合数</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="playerWeaponRanking" class="ranking-section">
      <h3>プレイヤー×武器別勝率ランキング</h3>
      <table border="1" id="playerWeaponRankingTable">
        <thead>
          <tr><th>順位</th><th>プレイヤー</th><th>武器</th><th>勝率</th><th>勝利数</th><th>試合数</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    function showRanking(type) {
      document.querySelectorAll(".ranking-section").forEach(sec => sec.style.display = "none");
      if (type === "player") document.getElementById("playerRanking").style.display = "block";
      if (type === "weapon") document.getElementById("weaponRanking").style.display = "block";
      if (type === "playerWeapon") document.getElementById("playerWeaponRanking").style.display = "block";
    }

    async function loadRanking() {
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "getRanking" }),
          headers: { "Content-Type": "application/json" }
        });
        const result = await res.json();

        const playerBody = document.querySelector("#playerRankingTable tbody");
        const weaponBody = document.querySelector("#weaponRankingTable tbody");
        const pwBody = document.querySelector("#playerWeaponRankingTable tbody");
        playerBody.innerHTML = "";
        weaponBody.innerHTML = "";
        pwBody.innerHTML = "";

        result.playerRanking.forEach((p, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${p.playerName}</td>
            <td>${(p.winRate * 100).toFixed(1)}%</td>
            <td>${p.wins}</td>
            <td>${p.total}</td>
          `;
          playerBody.appendChild(tr);
        });

        result.weaponRanking.forEach((w, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${w.weapon}</td>
            <td>${(w.winRate * 100).toFixed(1)}%</td>
            <td>${w.wins}</td>
            <td>${w.total}</td>
          `;
          weaponBody.appendChild(tr);
        });

        result.playerWeaponRanking.forEach((pw, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${pw.playerName}</td>
            <td>${pw.weapon}</td>
            <td>${(pw.winRate * 100).toFixed(1)}%</td>
            <td>${pw.wins}</td>
            <td>${pw.total}</td>
          `;
          pwBody.appendChild(tr);
        });

        showRanking("player"); // 初期表示
      } catch (e) {
        alert("ランキングの読み込みに失敗しました：" + e.message);
      }
    }
  </script>
</body>
</html>
