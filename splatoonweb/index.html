<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="スプラトゥーンの戦績を記録・分析できる非公式ツール。勝率、キルデス比、ランキングなどを確認できます。">
  <!-- Open Graph (SNS共有用) -->
  <meta property="og:title" content="SPL3VRMH | Splatoon3 Various Rankings and Match History Page">
  <meta property="og:description" content="スプラトゥーンの戦績を記録・分析できる非公式ツール。勝率、キルデス比、ランキングなどを確認できます。">
  <meta property="og:url" content="http://spl3vrmh.dpdns.org/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="http://spl3vrmh.dpdns.org/splatoonweb/ogp.png">
  <meta property="og:site_name" content="SPL3VRMH">

  <title>ログインページ | SPL3VRMH</title>
  <link rel="stylesheet" href="style.css">
  <script src="common.js"></script>
  <style>
    body {
      font-family: 'Ikamodoki', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      color: #fefefe;
      margin: 0;
      padding: 2em 1em;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2, h3 {
      text-align: center;
      color: #ffe600;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }

    input {
      background: #fff;
      color: #000;
    }

    button {
      background-color: #ff2d89;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 4px #000;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #ffe600;
      color: #000;
    }

    .message {
      margin-top: 1em;
      font-weight: bold;
    }

    #resetSection {
      display: none;
      margin-top: 2em;
      width: 100%;
      max-width: 400px;
    }

    label {
      display: block;
      margin-top: 1em;
      font-weight: bold;
    }

    form, .login-container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2em;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    a {
      color: #00cfff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media screen and (max-width: 480px) {
      body {
        padding: 1em;
      }

      input, button {
        font-size: 1em;
      }

      form, .login-container {
        padding: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>ログイン</h2>
    <input id="loginUserId" placeholder="ユーザーID"><br>
    <input id="loginPassword" type="password" placeholder="パスワード"><br>
    <button onclick="login()">ログイン</button>
    <p><a href="register.html">新規登録はこちら</a></p>
    <p><a href="#" onclick="toggleResetForm()">🔑 パスワードを忘れた方はこちら</a></p>
    <div id="loginMessage" class="message"></div>
  </div>

  <div id="resetSection">
    <h3>パスワード再設定</h3>
    <form id="resetForm">
      <label>ユーザーID:
        <input type="text" name="userId" required>
      </label>
      <label>シークレットID:
        <input type="text" name="secretId" required>
      </label>
      <label>新しいパスワード:
        <input type="password" name="newPassword" required>
      </label>
      <label>新しいパスワード（確認）:
        <input type="password" name="confirmPassword" required>
      </label>
      <button type="submit">パスワードを変更</button>
    </form>
    <div id="resetStatus" class="message"></div>
  </div>

  <script>
    function login() {
      const userId = document.getElementById("loginUserId").value.trim();
      const password = document.getElementById("loginPassword").value;
      const msg = document.getElementById("loginMessage");
      msg.textContent = "";
  
      fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          mode: "login", // ← Workerがactionに変換！
          userId,
          password
        })
      })
      .then(res => res.text())
      .then(text => {
        const result = JSON.parse(text);
        if (result.success) {
          localStorage.setItem("userId", userId);
          localStorage.setItem("secretId", result.secretId);
          localStorage.setItem("userName", result.userName || "");
          localStorage.setItem("isAdmin", result.isAdmin ? "true" : "false");
          window.location.href = "mypage.html";
        } else {
          msg.style.color = "red";
          msg.textContent = result.error || "ログインに失敗しました";
        }
      })
      .catch(err => {
        msg.style.color = "red";
        msg.textContent = "通信エラー：" + err.message;
      });
    }
  
    function toggleResetForm() {
      const section = document.getElementById("resetSection");
      section.style.display = section.style.display === "none" ? "block" : "none";
    }
  
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const status = document.getElementById("resetStatus");
  
      const userId = form.userId.value.trim();
      const secretId = form.secretId.value.trim();
      const newPassword = form.newPassword.value;
      const confirmPassword = form.confirmPassword.value;
  
      if (newPassword !== confirmPassword) {
        status.style.color = "red";
        status.textContent = "新しいパスワードが一致しません。";
        return;
      }
  
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            mode: "changePassword", // ← ここも mode！
            userId,
            secretId,
            currentPassword: "", // 現在のパスワードが不要なら空文字でOK
            newPassword
          })
        });
        const text = await res.text();
        const result = JSON.parse(text);
  
        if (result.status === "ok") {
          status.style.color = "limegreen";
          status.textContent = "パスワードを再設定しました！ログインしてください。";
          form.reset();
        } else {
          status.style.color = "red";
          status.textContent = "エラー：" + (result.error || "再設定に失敗しました");
        }
      } catch (err) {
        status.style.color = "red";
        status.textContent = "通信エラー：" + err.message;
      }
    });
  </script>

</body>
</html>
